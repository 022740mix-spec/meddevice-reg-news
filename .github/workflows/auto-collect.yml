name: Auto-collect AI Tool News

on:
  schedule:
    # 毎日 09:00 JST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── 更新前の記事数を記録（ガードレール用） ──
      - name: Count articles before
        id: before
        run: |
          COUNT=$(grep -c '"id":' src/data/aiToolsData.js)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "::notice::更新前の記事数: $COUNT"

      # ── 自動収集スクリプトを実行 ──
      - name: Run auto-collect script
        run: node scripts/collect.mjs

      # ── 更新後の記事数を確認（ガードレール） ──
      - name: Count articles after
        id: after
        run: |
          COUNT=$(grep -c '"id":' src/data/aiToolsData.js)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "::notice::更新後の記事数: $COUNT"

      # ── 記事数が減っていたら即座に中止 ──
      - name: Safety check - article count
        run: |
          BEFORE=${{ steps.before.outputs.count }}
          AFTER=${{ steps.after.outputs.count }}
          echo "Before: $BEFORE → After: $AFTER"
          if [ "$AFTER" -lt "$BEFORE" ]; then
            echo "::error::記事数が減少しています ($BEFORE → $AFTER)。データ破壊の可能性があるため中止します。"
            exit 1
          fi

      # ── ビルドが通るか確認 ──
      - name: Build check
        run: npm run build

      # ── 変更がなければ終了 ──
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      # ── 変更があればPRを作成（直接pushしない） ──
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="auto-update/$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          BEFORE=${{ steps.before.outputs.count }}
          AFTER=${{ steps.after.outputs.count }}
          git commit -m "chore: 自動更新 $(date +%Y-%m-%d)（記事 $BEFORE → $AFTER 本）"
          git push origin "$BRANCH"
          gh pr create \
            --title "自動更新 $(date +%Y-%m-%d)（記事 $BEFORE → $AFTER 本）" \
            --body "$(cat <<'EOF'
          ## 自動更新

          - 更新前: ${{ steps.before.outputs.count }} 記事
          - 更新後: ${{ steps.after.outputs.count }} 記事
          - ビルド: ✅ 成功

          **マージ前に差分を確認してください。**

          🤖 Generated by GitHub Actions
          EOF
          )" \
            --base main
